<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영화 정보 게시판</title>
    <!-- Tailwind CSS CDN 불러오기 -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<!-- 배경은 어두운 톤(bg-gray-900)으로 설정 -->
<body class="bg-gray-900 min-h-screen font-sans antialiased text-gray-100">

    <div class="container mx-auto px-4 py-12 max-w-6xl">
        <!-- 게시판 제목 -->
        <h1 class="text-3xl md:text-4xl font-bold text-center text-white mb-10 tracking-wider">
            🎬 최신 영화 게시판
        </h1>

        <!-- 카드 보드 레이아웃 (그리드 반응형 적용) -->
        <!-- 모바일: 1칸 / 태블릿: 2칸 / PC: 3칸 -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">

            <!-- 🍿 영화 카드 1 시작 -->
            <div class="bg-white rounded-2xl shadow-lg overflow-hidden transform transition duration-300 hover:-translate-y-2 hover:shadow-2xl flex flex-col">
                
                <!-- 영화 포스터 (임시 이미지 URL을 넣었습니다. 원하는 이미지 URL로 변경하세요) -->
                <img 
                    src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" 
                    alt="살목지 포스터" 
                    class="w-full h-80 object-cover"
                >
                
                <!-- 카드 텍스트 정보 영역 -->
                <div class="p-6 flex-1 flex flex-col bg-gray-50">
                    <!-- 영화 제목 -->
                    <h2 class="text-xl font-bold text-gray-900 mb-4 leading-tight">
                        살목지, Salmokji : Whispering Water (2025)
                    </h2>
                    
                    <!-- 시놉시스 (제공해주신 텍스트가 생략되어 있어, 분위기에 맞는 임시 텍스트를 넣었습니다. 이 부분을 지우고 가지고 계신 텍스트를 그대로 붙여넣으세요!) -->
                    <p class="text-gray-700 text-sm leading-relaxed whitespace-pre-line">
                        어느 날, 마을을 둘러싼 호수 '살목지'에서 기이한 속삭임이 들려오기 시작한다. 
                        
                        평화롭던 마을 사람들은 하나둘씩 환청에 시달리며 숨겨왔던 비밀들을 드러내고, 호수를 조사하던 주인공은 이 모든 현상이 과거의 끔찍한 사건과 연결되어 있음을 알게 되는데... 
                        
                        물결 아래 가라앉은 진실이 마침내 수면 위로 떠오른다.
                    </p>
                </div>
                
            </div>
            <!-- 🍿 영화 카드 1 끝 -->

            <!-- 필요하시다면 위 '영화 카드 1 시작 ~ 끝' 부분을 복사해서 아래에 붙여넣으면 카드가 계속 늘어납니다. -->

        </div>
    </div>

</body>
</html>
